<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Meside</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --orange: #ff5500; --black: #000; --border: #151515; --dim: #3d3d3d; }
    body {
      background: var(--black);
      color: #fff;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      width: 340px;
      border: 1px solid var(--border);
      padding: 40px 32px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    h1 span { color: var(--orange); }
    .sub {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid var(--border);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: var(--orange); }
    .err {
      font-size: 10px;
      color: #ff4444;
      letter-spacing: 0.1em;
      min-height: 16px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      background: var(--orange);
      color: #000;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.12em;
      padding: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>ADMIN <span>ACCESS</span></h1>
    <p class="sub">Rex Trueform Arts Hub</p>
    <label for="pw">Password</label>
    <input type="password" id="pw" placeholder="••••••••" autofocus>
    <p class="err" id="err"></p>
    <button id="btn">Enter</button>
  </div>

  <script>
    const btn = document.getElementById('btn');
    const pw  = document.getElementById('pw');
    const err = document.getElementById('err');

    async function tryLogin() {
      err.textContent = '';
      const res  = await fetch('/api/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw.value }),
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = '/admin';
      } else {
        err.textContent = data.error || 'Wrong password';
        pw.value = '';
        pw.focus();
      }
    }

    btn.addEventListener('click', tryLogin);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  </script>
</body>
</html>
