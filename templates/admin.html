<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Medici</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --orange: #ff5500;
      --black:  #000;
      --border: #151515;
      --dim:    #3d3d3d;
      --card:   #080808;
    }
    body {
      background: var(--black);
      color: #fff;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
    }
    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 36px;
      border-bottom: 1px solid var(--border);
    }
    .top-bar h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.1em;
    }
    .top-bar h1 span { color: var(--orange); }
    .top-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn:hover { color: #fff; border-color: #333; }
    .btn-orange {
      background: var(--orange);
      border-color: var(--orange);
      color: #000;
    }
    .btn-orange:hover { opacity: 0.85; color: #000; }
    /* ── Content ── */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 0.25em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    /* ── Video rows ── */
    .video-list { display: flex; flex-direction: column; gap: 2px; }
    .video-row {
      display: grid;
      grid-template-columns: 36px 120px 1fr 160px 80px;
      align-items: center;
      gap: 12px;
      background: var(--card);
      padding: 10px 16px;
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .video-row:hover { border-color: var(--border); }
    /* order arrows */
    .order-btns {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .order-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-size: 10px;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: color 0.15s, border-color 0.15s;
    }
    .order-btn:hover { color: var(--orange); border-color: var(--orange); }
    .order-btn:disabled { opacity: 0.2; cursor: default; }
    /* thumbnail */
    .thumb {
      width: 120px;
      height: 68px;
      object-fit: cover;
      background: #111;
      display: block;
    }
    /* inline edit */
    .edit-title {
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      width: 100%;
      padding: 2px 4px;
      outline: none;
      transition: border-color 0.2s;
    }
    .edit-title:focus { border-bottom-color: var(--orange); }
    .style-select {
      background: #0a0a0a;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      padding: 6px 8px;
      width: 100%;
      outline: none;
      cursor: pointer;
    }
    .style-select:focus { border-color: var(--orange); }
    .save-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .save-btn:hover { color: var(--orange); border-color: var(--orange); }
    .save-btn.saved { color: #4caf50; border-color: #4caf50; }
    /* loading */
    .admin-loading {
      text-align: center;
      padding: 80px;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--dim);
    }
    /* users section */
    .user-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .user-table th, .user-table td {
      text-align: left;
      padding: 10px 14px;
      font-size: 10px;
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--border);
    }
    .user-table th { color: var(--orange); text-transform: uppercase; }
    .user-table td { color: #aaa; }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>ADMIN <span>PANEL</span></h1>
    <div class="top-right">
      <a class="btn" href="/">← Back to site</a>
      <button class="btn" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="content">
    <p class="section-title">Gallery — Drag to reorder</p>
    <div class="video-list" id="videoList">
      <div class="admin-loading">Loading videos…</div>
    </div>

    <p class="section-title" style="margin-top:52px">Registered Users</p>
    <table class="user-table" id="userTable">
      <thead><tr><th>#</th><th>Email</th><th>Joined</th></tr></thead>
      <tbody id="userBody"><tr><td colspan="3" style="color:#333">Loading…</td></tr></tbody>
    </table>
  </div>

  <script>
    const STYLES = ['surrealism','psychedelic','atmospheric','gothic','cubism','historical','abstract'];

    // ── Logout ────────────────────────────────────────────────────────────────
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/admin';
    });

    // ── Load videos ───────────────────────────────────────────────────────────
    let allVideos = [];

    async function loadVideos() {
      const res  = await fetch('/api/videos');
      const data = await res.json();
      allVideos  = data.videos || [];
      renderList();
    }

    function renderList() {
      const list = document.getElementById('videoList');
      list.innerHTML = '';

      allVideos.forEach((v, idx) => {
        const row = document.createElement('div');
        row.className = 'video-row';
        row.dataset.file = v.file;

        // Up / down arrows
        const arrows = document.createElement('div');
        arrows.className = 'order-btns';

        const upBtn = document.createElement('button');
        upBtn.className = 'order-btn';
        upBtn.textContent = '▲';
        upBtn.disabled = idx === 0;
        upBtn.title = 'Move up';
        upBtn.addEventListener('click', () => move(v.file, 'up'));

        const downBtn = document.createElement('button');
        downBtn.className = 'order-btn';
        downBtn.textContent = '▼';
        downBtn.disabled = idx === allVideos.length - 1;
        downBtn.title = 'Move down';
        downBtn.addEventListener('click', () => move(v.file, 'down'));

        arrows.append(upBtn, downBtn);

        // Thumbnail (video poster frame)
        const thumb = document.createElement('video');
        thumb.className = 'thumb';
        thumb.src = v.src;
        thumb.preload = 'metadata';
        thumb.muted = true;
        thumb.playsInline = true;
        thumb.addEventListener('mouseenter', () => thumb.play().catch(() => {}));
        thumb.addEventListener('mouseleave', () => { thumb.pause(); thumb.currentTime = 0; });

        // Title input
        const titleInput = document.createElement('input');
        titleInput.className = 'edit-title';
        titleInput.value = v.title;
        titleInput.type = 'text';

        // Style select
        const styleSelect = document.createElement('select');
        styleSelect.className = 'style-select';
        STYLES.forEach(s => {
          const opt = document.createElement('option');
          opt.value = s;
          opt.textContent = s;
          if (s === v.style) opt.selected = true;
          styleSelect.appendChild(opt);
        });

        // Save button
        const saveBtn = document.createElement('button');
        saveBtn.className = 'save-btn';
        saveBtn.textContent = 'Save';
        saveBtn.addEventListener('click', async () => {
          const res = await fetch(`/api/videos/${encodeURIComponent(v.file)}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: titleInput.value, style: styleSelect.value }),
          });
          if (res.ok) {
            v.title = titleInput.value;
            v.style = styleSelect.value;
            saveBtn.textContent = 'Saved ✓';
            saveBtn.classList.add('saved');
            setTimeout(() => { saveBtn.textContent = 'Save'; saveBtn.classList.remove('saved'); }, 2000);
          }
        });

        row.append(arrows, thumb, titleInput, styleSelect, saveBtn);
        list.appendChild(row);
      });
    }

    async function move(filename, direction) {
      const res = await fetch('/api/videos/reorder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename, direction }),
      });
      if (res.ok) {
        // Reorder local array to reflect the swap immediately
        const idx      = allVideos.findIndex(v => v.file === filename);
        const swapIdx  = direction === 'up' ? idx - 1 : idx + 1;
        if (swapIdx >= 0 && swapIdx < allVideos.length) {
          [allVideos[idx], allVideos[swapIdx]] = [allVideos[swapIdx], allVideos[idx]];
          renderList();
        }
      }
    }

    // ── Load users ────────────────────────────────────────────────────────────
    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      if (!res.ok) return;
      const { users } = await res.json();
      const tbody = document.getElementById('userBody');
      tbody.innerHTML = '';
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="3" style="color:#333">No users yet</td></tr>';
        return;
      }
      users.forEach((u, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${i + 1}</td><td>${u.email}</td><td>${u.created_at.slice(0, 10)}</td>`;
        tbody.appendChild(tr);
      });
    }

    loadVideos();
    loadUsers();
  </script>
</body>
</html>
