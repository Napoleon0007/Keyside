<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meside</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,600;1,300;1,400&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <header class="site-header">
    <div class="top-bar">
      <div class="nav-left">
        <video class="nav-logo" autoplay muted loop playsinline>
          <source src="https://raw.githubusercontent.com/Napoleon0007/Art-Hub/main/Rex%20trueform%20logo.MP4" type="video/mp4">
        </video>
        <span class="nav-label">Rex Trueform Arts Hub</span>
      </div>
      <div class="nav-right">
        <img class="nav-skull" src="https://raw.githubusercontent.com/Napoleon0007/Art-Hub/main/orange%20skull.png" alt="">
<div id="navRight"></div>
      </div>
    </div>
    <div class="hero">
      <video class="hero-bg-video" autoplay muted loop playsinline>
        <source src="https://raw.githubusercontent.com/Napoleon0007/Art-Hub/main/Dark%20church.mp4" type="video/mp4">
      </video>
      <div class="hero-overlay"></div>
      <div class="hero-moon" aria-hidden="true">
        <img class="hero-moon-img" src="{{ url_for('static', filename='moon.jpg') }}" alt="">
      </div>
      <div class="hero-content">
        <h1 class="site-title"><span class="hero-letter side">R</span><span class="hero-letter side">e</span><span class="hero-letter side">x</span><span class="hero-space">&nbsp;</span><span class="hero-letter">T</span><span class="hero-letter">r</span><span class="hero-letter">u</span><span class="hero-letter">e</span><span class="hero-letter">f</span><span class="hero-letter">o</span><span class="hero-letter">r</span><span class="hero-letter">m</span></h1>
        <p class="site-sub-name">Rex <span class="orange floaty">True</span>form <span class="orange floaty">ART</span>s Hub</p>
        <div class="title-underline"></div>
        <p class="site-sub">fuck that shit.. I just wanna <span class="orange floaty">BAN</span>G!!</p>
      </div>
    </div>
  </header>

  <div class="filter-bar" id="filterBar">
    <div class="filter-scroll">
      <button class="filter-btn active" data-type="all">All</button>
      <button class="filter-btn" data-type="video">Video</button>
      <button class="filter-btn" data-type="image">Images</button>
      <button class="filter-btn" data-type="music">Music</button>
    </div>
    <div class="filter-count">
      <span id="countNum">—</span>&thinsp;works
    </div>
  </div>

  <main class="content" id="content">
    <div class="gallery-loading" id="galleryLoading">
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
  </main>

  <!-- Video modal -->
  <div class="modal" id="modal" aria-hidden="true" role="dialog">
    <div class="modal-bg" id="modalBg"></div>
    <div class="modal-box">
      <button class="modal-close" id="modalClose" aria-label="Close">&#x2715;</button>
      <div class="modal-video-wrap">
        <video class="modal-video" id="modalVideo" controls muted playsinline></video>
        <img class="modal-image" id="modalImage" alt="" style="display:none">
        <div class="modal-audio-wrap" id="modalAudioWrap" style="display:none">
          <div class="modal-audio-art">&#9835;</div>
          <audio class="modal-audio" id="modalAudio" controls></audio>
        </div>
      </div>
      <div class="modal-info">
        <div class="modal-info-left">
          <h2 class="modal-title" id="modalTitle"></h2>
          <span class="modal-style-tag" id="modalStyleTag"></span>
        </div>
        <button class="download-btn" id="downloadBtn" style="display:none">&#x2193; Download</button>
      </div>
    </div>
  </div>

  <!-- Auth modal -->
  <div class="auth-modal" id="authModal" aria-hidden="true">
    <div class="auth-modal-bg" id="authModalBg"></div>
    <div class="auth-box">
      <button class="auth-close" id="authClose">&#x2715;</button>
      <div class="auth-brand">
        <video class="auth-logo" autoplay muted loop playsinline>
          <source src="https://raw.githubusercontent.com/Napoleon0007/Art-Hub/main/Rex%20trueform%20logo.MP4" type="video/mp4">
        </video>
        <span class="auth-brand-name">Rex <span class="orange">Trueform</span></span>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Login</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>
      <form class="auth-form" id="authForm">
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="authEmail" autocomplete="email" required placeholder="your@email.com">
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="authPassword" autocomplete="current-password" required placeholder="••••••">
        </div>
        <p class="auth-error" id="authError"></p>
        <button type="submit" class="auth-submit" id="authSubmit">Login</button>
      </form>
    </div>
  </div>

  <!-- Upload modal -->
  <div class="auth-modal" id="uploadModal" aria-hidden="true">
    <div class="auth-modal-bg" id="uploadModalBg"></div>
    <div class="auth-box">
      <button class="auth-close" id="uploadClose">&#x2715;</button>
      <h3 class="auth-heading">Upload</h3>
      <div class="upload-drop" id="uploadDrop">
        <p>Drop a video, image or audio file here or <label class="upload-pick" for="uploadFile">choose file</label></p>
        <input type="file" id="uploadFile" accept="video/*,image/*,audio/*,.mp4,.webm,.mov,.m4v,.jpg,.jpeg,.png,.webp,.gif,.avif,.mp3,.wav,.m4a,.ogg,.flac" style="display:none">
        <p class="upload-name" id="uploadName"></p>
      </div>
      <p class="auth-error" id="uploadError"></p>
      <button class="auth-submit" id="uploadSubmit" disabled>Upload</button>
      <div class="upload-progress" id="uploadProgress" style="display:none">
        <div class="upload-bar" id="uploadBar"></div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
  <script src="{{ url_for('static', filename='effects.js') }}"></script>
  <script src="{{ url_for('static', filename='herotext.js') }}"></script>
</body>
</html>
